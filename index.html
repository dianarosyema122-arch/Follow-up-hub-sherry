<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>John Troutman Intros</title>
<style>
:root {
  --ink: #0f1a2e;
  --bg: #eef2f7;
  --card: #fff;
  --blue: #2356a8;
  --blue-pale: #dce8f8;
  --teal: #1a7a6e;
  --rust: #c04a28;
  --gold: #b07d2a;
  --muted: #6a7a8e;
  --border: #d0d8e4;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  font-family: -apple-system, "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  overscroll-behavior: none;
}
.hdr {
  background: var(--ink);
  padding: env(safe-area-inset-top, 0) 20px 0;
  position: sticky; top: 0; z-index: 100;
}
.hdr-inner { padding: 18px 0 0; }
.hdr h1 { font-size: 1.3rem; color: #eef2f7; line-height: 1.15; font-weight: 700; }
.hdr h1 em { color: #6fa3ef; font-style: normal; }
.hdr-sub { font-size: 0.68rem; color: rgba(220,232,255,0.45); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 3px; margin-bottom: 14px; }
.stats { display: flex; border-top: 1px solid rgba(255,255,255,0.08); }
.stat { flex: 1; padding: 10px 0; text-align: center; border-right: 1px solid rgba(255,255,255,0.08); }
.stat:last-child { border-right: none; }
.stat-n { font-size: 1.4rem; color: #6fa3ef; line-height: 1; font-weight: 700; }
.stat-l { font-size: 0.58rem; color: rgba(220,232,255,0.4); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
.filters { background: var(--card); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.filters::-webkit-scrollbar { display: none; }
.fp { flex-shrink: 0; padding: 7px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: transparent; font-size: 0.75rem; font-weight: 600; color: var(--muted); cursor: pointer; white-space: nowrap; -webkit-appearance: none; }
.fp.active { background: var(--ink); border-color: var(--ink); color: #eef2f7; }
.list { padding: 12px 16px 60px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 12px; overflow: hidden; }
.card.hidden { display: none; }
.card.open { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
.card-top { padding: 16px; display: flex; align-items: flex-start; gap: 12px; cursor: pointer; user-select: none; -webkit-user-select: none; }
.avatar { width: 44px; height: 44px; border-radius: 10px; background: var(--ink); display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: 700; color: #6fa3ef; flex-shrink: 0; }
.card-info { flex: 1; min-width: 0; }
.card-name { font-size: 1rem; font-weight: 700; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-org { font-size: 0.72rem; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-date { font-size: 0.65rem; color: var(--muted); margin-top: 5px; }
.card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
.pill { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; white-space: nowrap; }
.pill-dot { width: 5px; height: 5px; border-radius: 50%; }
.pill-yours { background: rgba(192,74,40,0.12); color: var(--rust); }
.pill-yours .pill-dot { background: var(--rust); }
.pill-theirs { background: rgba(176,125,42,0.12); color: var(--gold); }
.pill-theirs .pill-dot { background: var(--gold); }
.pill-active { background: rgba(26,122,110,0.1); color: var(--teal); }
.pill-active .pill-dot { background: var(--teal); }
.pill-scheduled { background: rgba(35,86,168,0.1); color: var(--blue); }
.pill-scheduled .pill-dot { background: var(--blue); }
.chevron { font-size: 0.9rem; color: var(--muted); transition: transform 0.2s; align-self: center; display: inline-block; }
.card.open .chevron { transform: rotate(180deg); }
.card-body { display: none; border-top: 1px solid var(--border); }
.card.open .card-body { display: block; }
.section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
.slabel { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 700; margin-bottom: 6px; }
.stext { font-size: 0.82rem; line-height: 1.65; color: var(--ink); }
.stext strong { font-weight: 700; }
.tl { display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 14px 16px; border-bottom: 1px solid var(--border); scrollbar-width: none; }
.tl::-webkit-scrollbar { display: none; }
.tl-ev { display: flex; flex-direction: column; align-items: center; min-width: 68px; position: relative; padding: 0 4px; }
.tl-ev:not(:last-child)::after { content: ""; position: absolute; top: 7px; left: calc(50% + 7px); width: calc(100% - 6px); height: 1px; background: var(--border); }
.tl-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--border); z-index: 1; flex-shrink: 0; margin-bottom: 5px; }
.tl-dot.you { background: var(--teal); }
.tl-dot.them { background: var(--gold); }
.tl-dot.john { background: var(--ink); }
.tl-dot.sched { background: var(--blue); }
.tl-date { font-size: 0.58rem; color: var(--muted); text-align: center; line-height: 1.3; }
.tl-who { font-size: 0.6rem; font-weight: 600; color: var(--ink); text-align: center; margin-top: 2px; }
.draft-section { padding: 14px 16px; }
.draft-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.copy-btn { padding: 9px 20px; min-height: 38px; background: var(--ink); color: #eef2f7; border: none; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer; -webkit-appearance: none; }
.copy-btn.copied { background: var(--teal); }
.draft-box { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; font-size: 0.8rem; line-height: 1.75; color: var(--ink); white-space: pre-wrap; }
.new-tag { display: inline-block; background: var(--rust); color: white; font-size: 0.55rem; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; vertical-align: middle; margin-left: 4px; }
.urgent-tag { display: inline-block; background: var(--blue); color: white; font-size: 0.55rem; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; vertical-align: middle; margin-left: 4px; }
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-inner">
    <h1>Intros via <em>John Troutman</em></h1>
    <div class="hdr-sub">MindClub America · VP Business Development</div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-n">8</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n" id="sc-yours">-</div><div class="stat-l">Your Turn</div></div>
    <div class="stat"><div class="stat-n" id="sc-theirs">-</div><div class="stat-l">Theirs</div></div>
    <div class="stat"><div class="stat-n" id="sc-active">-</div><div class="stat-l">Active</div></div>
  </div>
</div>
<div class="filters">
  <button class="fp active" data-f="all">All</button>
  <button class="fp" data-f="yours">Your Turn</button>
  <button class="fp" data-f="theirs">Their Turn</button>
  <button class="fp" data-f="active">Active</button>
  <button class="fp" data-f="scheduled">Scheduled</button>
</div>
<div class="list" id="list"></div>
<script>
var data=[
{id:1,name:"Spencer Allen",ini:"SA",org:"IOA — Insurance Office of America",email:"spencer.allen@ioausa.com",intro:"Mar 23, 2026",last:"May 11, 2026",turn:"yours",isNew:false,isUrgent:true,
why:"SVP/Managing Partner at IOA (Insurance Office of America), one of the largest independent insurance agencies in the US. John calls him one of MindClub's greatest supporters and passionate about mental health. Very senior, well-connected broker with major employer relationships.",
status:"Spencer asked 'Which Friday — this week or next?' on May 11. You never replied. He's waiting on you to pick a time.",
tl:[{d:"Mar 23",w:"John",c:"john"},{d:"Mar 27",w:"You",c:"you"},{d:"Apr 17",w:"You x2",c:"you"},{d:"May 4",w:"Spencer",c:"them"},{d:"May 7",w:"You",c:"you"},{d:"May 11",w:"Spencer ✉",c:"them"}],

{id:2,name:"Ryan Van Etten & Scott Borden",ini:"RV",org:"WLT Software",email:"rvanetten@wltsoftware.com",intro:"Feb 24, 2026",last:"Mar 23, 2026",turn:"theirs",isNew:false,isUrgent:false,
why:"MindClub partners at WLT Software — they support mental health solutions for their employer clients. John also connected you specifically to discuss working together on unions as a shared market. A collaboration could open employer group access through a technology partner.",
status:"John flagged unions as a shared opportunity (Apr 17). You followed up twice in March. No reply from Ryan or Scott visible since.",
tl:[{d:"Feb 24",w:"John",c:"john"},{d:"Mar 5",w:"You",c:"you"},{d:"Mar 23",w:"You x2",c:"you"},{d:"Apr 17",w:"John: unions",c:"john"}],
draft:"Hi Ryan and Scott,\n\nI apologize for the slow follow-up — things have been nonstop and I kept meaning to get back properly.\n\nI remain really excited about connecting, especially now that John has flagged unions as a shared opportunity for both of us. I think there's a real overlap in what we're each building and I'd love to explore it.\n\nWould you both be open to a 30-minute call in the next couple of weeks?\n\nWarmly,\nSherry"},

{id:3,name:"Dr. Bernard Bubanic",ini:"BB",org:"Integrated Source One (ISO)",email:"bernard.bubanic@intsourceone.com",intro:"Oct 21, 2025",last:"Oct 22, 2025",turn:"yours",isNew:false,isUrgent:false,
why:"President & CEO of Integrated Source One — John's top choice for primary care strategic partnership. ISO is part of the MindClub/Enthea ecosystem. Dr. Bubanic already replied warmly and asked to set up an intro call. This is a dropped ball that needs a direct apology.",
status:"Dr. Bubanic replied Oct 22 asking to set up a call. You never responded. It has been over 7 months.",
tl:[{d:"Oct 21",w:"John",c:"john"},{d:"Oct 22",w:"Dr. B ✉",c:"them"}],
draft:"Hi Dr. Bubanic (and Troy),\n\nI owe you a real apology — you graciously replied back in October asking to connect, and I completely dropped the ball. I'm sorry. It was a difficult period and that's no excuse for leaving you hanging for this long.\n\nThings have calmed down considerably, and I would genuinely love to reconnect and explore what John had in mind for our organizations. He speaks so highly of you and ISO, and I think there's real alignment worth exploring.\n\nWould you be open to a call? I'm flexible and happy to work around your schedule.\n\nWarmly,\nSherry"},

{id:4,name:"Tim Hawley",ini:"TH",org:"Exemplar Insurance Associates",email:"tim.hawley@exemplarinsuranceassociates.com",intro:"May 12, 2026",last:"May 18, 2026",turn:"yours",isNew:true,isUrgent:false,
why:"CEO of Exemplar Insurance Associates and part of the ISO network as their mental health solution partner. Has a personal interest in psychedelic therapy AND is extremely well-connected — John flagged he could open a lot of doors. Jessica had an initial call (someone else joined unexpectedly). You've planned to reach out personally about his own interest in psychedelic therapy.",
status:"Jessica met with him May 18 and shared solutions. You planned to reach out personally re: his own interest in psychedelic therapy. Haven't done so yet.",
tl:[{d:"May 12",w:"John",c:"john"},{d:"May 12",w:"Jessica",c:"you"},{d:"May 13",w:"You (plan)",c:"you"},{d:"May 18",w:"Jessica met",c:"you"}],
draft:"Hi Tim,\n\nSo great that you and Jessica connected! I wanted to reach out personally as well — John mentioned you have a genuine personal interest in psychedelic therapy, and that resonated with me.\n\nI'd love to connect one-on-one to talk through both the personal and the professional sides of what we're doing at Enthea. The conversations that start from a place of real curiosity tend to be the best ones.\n\nWould you have 20–30 minutes in the coming week or two?\n\nWarmly,\nSherry"},

{id:5,name:"Laurence Turell",ini:"LT",org:"National Financial (NatFin)",email:"lturell@natfin.net",intro:"Apr 2026 (John) / Sep 2025 (you first)",last:"Sep 12, 2025",turn:"theirs",isNew:false,isUrgent:false,
why:"Helps business owners save money by redesigning employee benefits. You actually reached out to him first in September 2025 with a full Enthea overview — ketamine-assisted therapy, stellate ganglion block, outcomes data (86% PTSD reduction, 67% depression, 65% anxiety), referral program. Now John has also introduced you, creating a second warm touchpoint.",
status:"You sent a detailed Enthea overview Sep 12, 2025 and never heard back. John's April intro gives you a fresh, non-awkward reason to re-engage.",
tl:[{d:"Sep 8",w:"You first",c:"you"},{d:"Sep 12",w:"You: overview",c:"you"},{d:"Apr 2026",w:"John intro",c:"john"}],
draft:"Hi Laurence,\n\nJohn Troutman recently connected us, and I realized I had actually reached out to you back in September with some information about Enthea — so we've been circling each other for a while!\n\nI'd love to take a fresh run at connecting properly. Given that you help business owners redesign employee benefits, I think our work — advanced behavioral health therapies for employees, including ketamine-assisted therapy and treatments for PTSD, depression, and anxiety — is exactly the kind of thing that could be meaningful to your clients.\n\nWould you be open to a 20-minute call?\n\nWarmly,\nSherry"},

{id:6,name:"Bobby Marulli",ini:"BM",org:"Diabetes Reversal Group (DRG)",email:"bmarulli@diabetesreversalgroup.com",intro:"Apr/May 2026 (John)",last:"May 18, 2026",turn:"scheduled",isNew:false,isUrgent:false,
why:"DRG is MindClub's partner for reversing Type 2 diabetes through lifestyle and clinical intervention. Bobby reached out proactively (sent a LinkedIn event replay in Feb), replied enthusiastically when introduced, and has a call already booked. Metabolic health and mental health are deeply connected — strong synergy with Enthea.",
status:"Call scheduled June 3, 2026 at 11am–11:30am EDT. Bobby accepted the invite. ✅ No action needed.",
tl:[{d:"Feb 17",w:"Bobby (LinkedIn)",c:"them"},{d:"May 18",w:"You: invite",c:"you"},{d:"May 18",w:"Bobby ✓",c:"them"},{d:"Jun 3",w:"Call 🗓",c:"sched"}],
draft:"Hi Bobby,\n\nLooking forward to our call on June 3rd! Just wanted to send a quick note ahead of time — I've been following what DRG is doing and I think the intersection of metabolic health and mental/behavioral health is one of the most underexplored areas in employer wellness right now.\n\nI'm excited to learn more about your work and share what we're doing at Enthea. See you on the 3rd!\n\nWarmly,\nSherry"},

{id:7,name:"Paula Segal, MHA",ini:"PS",org:"ClearGuide Advisors",email:"paula@clearguideadvisors.com",intro:"Jan 2026 (John)",last:"Jan 13, 2026",turn:"active",isNew:false,isUrgent:false,
why:"Medicare advisor for retiring professionals in NJ and PA with 20+ years in employer benefits and health plan strategy. John saw wellness space synergy. Paula gave you her personal cell (215-880-8343) and accepted a call — conversation moved to text/phone.",
status:"Call was Jan 13, 2026 at 11am PT. Paula accepted and gave you her cell. Relationship moved to phone/text — likely active but no email trail to confirm next steps.",
tl:[{d:"Jan 2026",w:"John",c:"john"},{d:"Jan 13",w:"Call ✓",c:"sched"}],
draft:"Hi Paula,\n\nI hope you've been well since we connected in January! I wanted to reach out and check in — I'd love to hear how things are going on your end and see if there are any ways we can support each other.\n\nAs Enthea continues to grow our employer footprint, I keep thinking about the retiring and transitioning employee population and how our services could be relevant there. Would love to reconnect for a quick catch-up.\n\nWarmly,\nSherry"},

{id:8,name:"Ryan Cain + College Intros",ini:"RC",org:"MindClub America",email:"rcain@mindclubamerica.com",intro:"Apr 23 & Apr 28, 2026",last:"Apr 28, 2026",turn:"yours",isNew:true,isUrgent:false,
why:"John sent two separate 'College Intros / Enthea Intro' meeting invites including Ryan Cain (MindClub) and Sherry — appears to be a group introduction call to a set of college-affiliated contacts. The nature of these intros isn't fully clear from the email snippets — likely mental health contacts in higher education or college sports.",
status:"Two Teams meeting invites sent (Apr 23 and Apr 28). No visible reply or confirmation from you. Worth clarifying with John what these intros are.",
tl:[{d:"Apr 23",w:"John: invite",c:"john"},{d:"Apr 28",w:"John: invite 2",c:"john"}],
draft:"Hi John,\n\nI wanted to follow up on the College Intros / Enthea Intro meetings you set up in late April — I want to make sure I didn't miss anything and that Ryan and I are coordinated on any follow-up.\n\nCould you give me a quick reminder on who those introductions were with and what the best next step is? I want to make sure I give these the proper attention.\n\nThank you!\n\nWarmly,\nSherry"}
];

function pclass(t){return t==="yours"?"pill-yours":t==="theirs"?"pill-theirs":t==="scheduled"?"pill-scheduled":"pill-active";}
function plabel(t){return t==="yours"?"Your Turn":t==="theirs"?"Their Turn":t==="scheduled"?"Scheduled":"Active";}

function render(f){
  var list=document.getElementById("list");
  list.innerHTML="";
  var y=0,t=0,a=0;
  data.forEach(function(c){
    if(c.turn==="yours")y++;
    else if(c.turn==="theirs")t++;
    else a++;
  });
  document.getElementById("sc-yours").textContent=y;
  document.getElementById("sc-theirs").textContent=t;
  document.getElementById("sc-active").textContent=a;
  data.forEach(function(c){
    var show=f==="all"
      ||(f==="yours"&&c.turn==="yours")
      ||(f==="theirs"&&c.turn==="theirs")
      ||(f==="active"&&c.turn==="active")
      ||(f==="scheduled"&&c.turn==="scheduled");
    var div=document.createElement("div");
    div.className="card"+(show?"":" hidden");
    var tl=c.tl.map(function(e){return'<div class="tl-ev"><div class="tl-dot '+e.c+'"></div><div class="tl-date">'+e.d+'</div><div class="tl-who">'+e.w+'</div></div>';}).join("");
    var tags='';
    if(c.isNew) tags+='<span class="new-tag">New</span>';
    if(c.isUrgent) tags+='<span class="urgent-tag">⚡ Reply Now</span>';
    div.innerHTML='<div class="card-top" onclick="tog(this)"><div class="avatar">'+c.ini+'</div><div class="card-info"><div class="card-name">'+c.name+tags+'</div><div class="card-org">'+c.org+'</div><div class="card-date">Intro: '+c.intro+' · Last: '+c.last+'</div></div><div class="card-right"><span class="pill '+pclass(c.turn)+'"><span class="pill-dot"></span>'+plabel(c.turn)+'</span><span class="chevron">&#9662;</span></div></div><div class="card-body"><div class="section"><div class="slabel">Why Connect</div><div class="stext">'+c.why+'</div></div><div class="section"><div class="slabel">Status &amp; Next Step</div><div class="stext"><strong>'+plabel(c.turn)+'</strong> &mdash; '+c.status+'</div></div><div class="tl">'+tl+'</div><div class="draft-section"><div class="draft-hdr"><div class="slabel" style="margin:0">&#9993; Draft</div><button class="copy-btn" onclick="cp(event,'+c.id+')">Copy</button></div><div class="draft-box" id="d'+c.id+'">'+c.draft+'</div></div></div>';
    list.appendChild(div);
  });
}

function tog(el){el.closest(".card").classList.toggle("open");}

function cp(e,id){
  e.stopPropagation();
  var btn=e.target;
  var text=document.getElementById("d"+id).textContent;
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(function(){
      btn.textContent="Copied!";btn.classList.add("copied");
      setTimeout(function(){btn.textContent="Copy";btn.classList.remove("copied");},2000);
    });
  } else {
    var ta=document.createElement("textarea");
    ta.value=text;ta.style.cssText="position:fixed;top:-9999px;left:-9999px;opacity:0;";
    document.body.appendChild(ta);ta.focus();ta.select();
    try{document.execCommand("copy");}catch(err){}
    document.body.removeChild(ta);
    btn.textContent="Copied!";btn.classList.add("copied");
    setTimeout(function(){btn.textContent="Copy";btn.classList.remove("copied");},2000);
  }
}

document.querySelectorAll(".fp").forEach(function(b){
  b.addEventListener("click",function(){
    document.querySelectorAll(".fp").forEach(function(x){x.classList.remove("active");});
    this.classList.add("active");render(this.dataset.f);
  });
});

render("all");
</script>
</body>
</html>
