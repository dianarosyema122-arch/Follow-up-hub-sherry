<style>
  :root {
    --ink: #1a1612;
    --parchment: #f5f0e8;
    --cream: #faf7f2;
    --gold: #b8892a;
    --gold-light: #e8d5a3;
    --rust: #c0522a;
    --teal: #2a6b6e;
    --muted: #7a6e62;
    --border: #d8cfc0;
    --card-bg: #ffffff;
    --status-yours: #2a6b6e;
    --status-theirs: #b8892a;
    --status-done: #4a7c52;
    --status-warn: #c0522a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--parchment);
    color: var(--ink);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--ink);
    padding: 36px 48px 32px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent,
      transparent 60px,
      rgba(184,137,42,0.06) 60px,
      rgba(184,137,42,0.06) 61px
    );
  }
  .header-inner { position: relative; z-index: 1; }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    color: var(--parchment);
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .header h1 span { color: var(--gold); }
  .header-meta {
    margin-top: 10px;
    color: var(--gold-light);
    font-size: 0.85rem;
    font-weight: 300;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .stats-bar {
    display: flex;
    gap: 32px;
    margin-top: 24px;
    flex-wrap: wrap;
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--gold);
    line-height: 1;
  }
  .stat-label {
    font-size: 0.72rem;
    color: rgba(245,240,232,0.6);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* FILTERS */
  .controls {
    padding: 20px 48px;
    background: var(--cream);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .filter-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-right: 4px;
  }
  .filter-btn {
    padding: 6px 16px;
    border: 1px solid var(--border);
    background: white;
    border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--ink);
  }
  .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
  .filter-btn.active { background: var(--ink); color: var(--parchment); border-color: var(--ink); }

  /* MAIN */
  .main { padding: 36px 48px; }

  /* CARDS */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    margin-bottom: 20px;
    transition: box-shadow 0.2s;
    animation: fadeUp 0.35s ease both;
  }
  .card:hover { box-shadow: 0 4px 24px rgba(26,22,18,0.09); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card.hidden { display: none; }

  .card-header {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: start;
    padding: 22px 26px 18px;
    border-bottom: 1px solid var(--border);
    gap: 16px;
    cursor: pointer;
  }
  .card-header:hover .expand-icon { color: var(--gold); }

  .person-info { display: flex; flex-direction: column; gap: 4px; }
  .person-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .person-title {
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 300;
  }
  .person-email {
    font-size: 0.75rem;
    color: var(--gold);
    font-weight: 400;
    letter-spacing: 0.01em;
  }

  .card-badges {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-radius: 2px;
  }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; }
  .badge-yours { background: rgba(42,107,110,0.1); color: var(--status-yours); }
  .badge-yours .badge-dot { background: var(--status-yours); }
  .badge-theirs { background: rgba(184,137,42,0.1); color: var(--status-theirs); }
  .badge-theirs .badge-dot { background: var(--status-theirs); }
  .badge-done { background: rgba(74,124,82,0.1); color: var(--status-done); }
  .badge-done .badge-dot { background: var(--status-done); }
  .badge-warn { background: rgba(192,82,42,0.1); color: var(--status-warn); }
  .badge-warn .badge-dot { background: var(--status-warn); }

  .date-badge {
    font-size: 0.7rem;
    color: var(--muted);
    text-align: right;
    font-weight: 300;
  }

  .expand-icon {
    font-size: 1rem;
    color: var(--muted);
    transition: transform 0.2s, color 0.2s;
    align-self: center;
  }
  .card.expanded .expand-icon { transform: rotate(180deg); }

  /* CARD BODY */
  .card-body {
    display: none;
  }
  .card.expanded .card-body { display: block; }

  .card-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }

  .card-section {
    padding: 20px 26px;
  }
  .card-section:first-child { border-right: 1px solid var(--border); }

  .section-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .section-text {
    font-size: 0.875rem;
    line-height: 1.65;
    color: var(--ink);
    font-weight: 300;
  }
  .section-text strong { font-weight: 500; color: var(--ink); }

  /* TIMELINE */
  .card-timeline {
    padding: 18px 26px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0;
    overflow-x: auto;
  }
  .timeline-event {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 90px;
    position: relative;
    padding: 0 6px;
  }
  .timeline-event:not(:last-child)::after {
    content: '';
    position: absolute;
    top: 8px;
    left: calc(50% + 8px);
    width: calc(100% - 8px);
    height: 1px;
    background: var(--border);
  }
  .timeline-dot {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--border);
    border: 2px solid var(--card-bg);
    z-index: 1;
    flex-shrink: 0;
    margin-bottom: 6px;
  }
  .timeline-dot.you { background: var(--teal); }
  .timeline-dot.them { background: var(--gold); }
  .timeline-dot.lee { background: var(--ink); }
  .timeline-date { font-size: 0.6rem; color: var(--muted); text-align: center; line-height: 1.3; }
  .timeline-who { font-size: 0.65rem; font-weight: 500; color: var(--ink); text-align: center; margin-top: 2px; }

  /* DRAFT */
  .card-draft { padding: 20px 26px; }
  .draft-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .draft-title {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    font-weight: 500;
  }
  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    background: var(--ink);
    color: var(--parchment);
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
    border-radius: 1px;
  }
  .copy-btn:hover { background: var(--gold); }
  .copy-btn.copied { background: var(--status-done); }

  .draft-box {
    background: var(--cream);
    border: 1px solid var(--border);
    padding: 18px;
    font-size: 0.83rem;
    line-height: 1.75;
    color: var(--ink);
    white-space: pre-wrap;
    font-weight: 300;
    position: relative;
  }

  /* NEW BADGE */
  .new-tag {
    background: var(--rust);
    color: white;
    font-size: 0.6rem;
    padding: 2px 7px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 500;
    border-radius: 1px;
  }

  @media (max-width: 768px) {
    .header { padding: 24px 20px; }
    .header h1 { font-size: 1.6rem; }
    .main, .controls { padding: 20px; }
    .card-grid { grid-template-columns: 1fr; }
    .card-section:first-child { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>

function getTurnClass(t) {
  if (t === 'yours') return 'badge-warn';
  if (t === 'theirs') return 'badge-theirs';
  if (t === 'active') return 'badge-done';
  return 'badge-done';
}
function getTurnLabel(t) {
  if (t === 'yours') return 'Your Turn';
  if (t === 'theirs') return "Their Turn";
  if (t === 'active') return 'Active';
  return 'Active';
}

function renderCards(filter = 'all') {
  const container = document.getElementById('cards-container');
  container.innerHTML = '';
  let yours = 0, theirs = 0, active = 0;
  contacts.forEach(c => {
    if (c.turn === 'yours') yours++;
    else if (c.turn === 'theirs') theirs++;
    else active++;
  });
  document.getElementById('yours-count').textContent = yours;
  document.getElementById('theirs-count').textContent = theirs;
  document.getElementById('active-count').textContent = active;

  contacts.forEach((c, idx) => {
    const show = filter === 'all'
      || (filter === 'yours' && c.turn === 'yours')
      || (filter === 'theirs' && c.turn === 'theirs')
      || (filter === 'active' && c.turn === 'active')
      || (filter === 'new' && c.isNew);

    const div = document.createElement('div');
    div.className = 'card' + (show ? '' : ' hidden');
    div.style.animationDelay = (idx * 0.04) + 's';
    div.dataset.filter = c.turn;
    div.dataset.new = c.isNew;

    const tl = c.timeline.map(t => `
      <div class="timeline-event">
        <div class="timeline-dot ${t.cls}"></div>
        <div class="timeline-date">${t.date}</div>
        <div class="timeline-who">${t.who}</div>
      </div>`).join('');

    div.innerHTML = `
      <div class="card-header" onclick="toggleCard(this)">
        <div>
          <div class="person-info">
            <div class="person-name">${c.name} ${c.isNew ? '<span class="new-tag">New</span>' : ''}</div>
            <div class="person-title">${c.title}</div>
            <div class="person-email">${c.email}</div>
          </div>
        </div>
        <div class="card-badges">
          <span class="badge ${getTurnClass(c.turn)}">
            <span class="badge-dot"></span>${getTurnLabel(c.turn)}
          </span>
          <div class="date-badge">Introduced: ${c.introduced}<br>Last email: ${c.lastEmail}</div>
        </div>
        <div class="expand-icon">▾</div>
      </div>
      <div class="card-body">
        <div class="card-grid">
          <div class="card-section">
            <div class="section-label">Why You'd Want to Connect</div>
            <div class="section-text">${c.why}</div>
          </div>
          <div class="card-section">
            <div class="section-label">Status &amp; Next Step</div>
            <div class="section-text"><strong>Turn:</strong> ${getTurnLabel(c.turn)}<br><br>${c.turnNote}</div>
          </div>
        </div>
        <div class="card-timeline">
          ${tl}
        </div>
        <div class="card-draft">
          <div class="draft-header">
            <div class="draft-title">✉ Draft Follow-Up</div>
            <button class="copy-btn" onclick="copyDraft(this, ${c.id})">Copy Draft</button>
          </div>
          <div class="draft-box" id="draft-${c.id}">${c.draft}</div>
        </div>
      </div>`;
    container.appendChild(div);
  });
}

function toggleCard(header) {
  const card = header.closest('.card');
  card.classList.toggle('expanded');
}

function copyDraft(btn, id) {
  const text = document.getElementById('draft-' + id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy Draft';
      btn.classList.remove('copied');
    }, 2000);
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    renderCards(this.dataset.filter);
  });
});

renderCards('all');
</script>
</body>
</html>
